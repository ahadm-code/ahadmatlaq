<!DOCTYPE html>
<html>
  <body>
    <!--
      This file exists only so Netlify registers the contact form at build time.
      It is NEVER shown to users — it's a static skeleton for form detection.
      The actual form is rendered by the React component in src/routes/index.tsx.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="hidden" name="bot-field" />
    </form>
  </body>
</html>
